<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
/* ============================================================
   Wave 21.1 — chrome-stripped /play/. Full-viewport, edge-to-edge
   game canvas. No nav, no version pill, no altitude counter.
   Close the tab to leave; there is no menu.
   ============================================================ */
html, body {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: var(--ink-aubergine);
}
.play-shell {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
#scene-canvas {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  display: block;
}
#game-canvas {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}
#game-canvas canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* ===== HUD root — kept ONLY as an injection point for HudOverlay
   (game-info pill in the top-left, attached by HudOverlay.attach()).
   Wave 21.1 stripped the nav pill, version pill, and altitude counter.
   The reveal-zone + opacity-on-hover pattern stays so the in-game
   info pill is invisible-by-default and reveals on cursor approach. ===== */
.hud {
  position: fixed; top: 0; left: 0;
  display: flex;
  padding: 14px 18px;
  padding-top: max(14px, env(safe-area-inset-top, 0px));
  padding-left: max(18px, env(safe-area-inset-left, 0px));
  z-index: 10;
  font-family: var(--font-body);
  pointer-events: none;
  opacity: 0.25;
  transform: scale(0.92);
  transform-origin: top left;
  transition: opacity 220ms ease-out, transform 220ms ease-out;
  will-change: opacity, transform;
}
.hud:hover,
.hud:focus-within,
.hud.is-revealed {
  opacity: 1;
  transform: scale(1);
}
.hud.is-autovj-hidden {
  opacity: 0 !important;
  transform: scale(0.9) !important;
  pointer-events: none !important;
}
.hud-left {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  pointer-events: auto;
  flex-wrap: wrap;
}
.hud-reveal-zone {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 80px;
  z-index: 9;
  pointer-events: auto;
  background: transparent;
}
.hud-reveal-zone:hover ~ .hud,
.hud-reveal-zone:active ~ .hud {
  opacity: 1;
  transform: scale(1);
}

/* Shared pill chrome — used by the game-info pill that HudOverlay injects. */
.hud-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  background: rgba(20, 16, 26, 0.55);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(244, 162, 97, 0.3);
  border-radius: 18px;
  padding: 10px 14px;
  color: var(--mushroom-cream);
  box-shadow: 0 6px 18px rgba(20, 16, 26, 0.18);
  pointer-events: auto;
}
.hud-pill--gameinfo .hud-pill__label {
  font-family: var(--font-heading);
  font-style: italic;
  font-weight: 500;
  font-size: 18px;
  color: var(--saffron-glow);
  letter-spacing: 0.01em;
  margin-right: 0.25rem;
}
.hud-pill--gameinfo .hud-pill__hearts,
.hud-pill--gameinfo .hud-pill__icon {
  display: inline-block;
  vertical-align: middle;
}
.hud-pill--gameinfo .hud-pill__count {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.04em;
  color: var(--mushroom-cream);
  min-width: 1.4ch;
  text-align: right;
}
.hud-pill--gameinfo .hud-pill__state {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 12px;
  color: rgba(245, 237, 216, 0.6);
  margin-left: 0.5rem;
  letter-spacing: 0.06em;
}

/* ===== Bottom-center: controls hint pill (auto-hide after 8s, motion-controls intro) ===== */
.hud-pill--controls {
  position: fixed;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
  z-index: 11;
  font-size: 12px;
  letter-spacing: 0.05em;
  pointer-events: none;
  opacity: 0;
  transition: opacity 600ms var(--ease-out-expo),
              transform 600ms var(--ease-out-expo);
  padding: 8px 16px;
}
.hud-pill--controls.hud-pill--visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.hud-pill--controls .hud-key {
  display: inline-flex;
  align-items: baseline;
  gap: 0.35rem;
}
.hud-pill--controls .hud-key + .hud-key { margin-left: 0.2rem; }
.hud-pill--controls .hud-key__sym {
  font-family: var(--font-mono);
  color: var(--saffron-glow);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.hud-pill--controls .hud-key__lbl {
  font-family: var(--font-body);
  color: rgba(245, 237, 216, 0.78);
  font-style: italic;
  font-size: 11px;
}

@media (max-width: 1023px) {
  .hud-pill { padding: 9px 12px; gap: 0.45rem; }
  .hud-pill--gameinfo .hud-pill__label { font-size: 16px; }
  .hud-pill--gameinfo .hud-pill__count { font-size: 13px; }
}

@media (max-width: 600px) {
  .hud { padding: 10px 10px; padding-top: max(10px, env(safe-area-inset-top, 0px)); }
  .hud-pill { padding: 8px 10px; gap: 0.35rem; border-radius: 14px; }
  .hud-pill--gameinfo .hud-pill__label { font-size: 14px; }
  .hud-pill--gameinfo .hud-pill__count { font-size: 12px; }
  .hud-pill--gameinfo .hud-pill__state { display: none; }
  .hud-pill--controls { display: none !important; }
}

/* ===== Wave 22 — dev-invite link (lives in the hover-reveal hud) + trampoline
   hint. The invite carries the §3b open-substrate pitch quietly; it reveals
   with the rest of the hud on cursor-approach. ===== */
.hud-invite {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 13px;
  color: var(--saffron-glow);
  text-decoration: none;
  letter-spacing: 0.02em;
  white-space: nowrap;
  pointer-events: auto;
  border-bottom: 1px solid rgba(244, 162, 97, 0.32);
  padding-bottom: 1px;
  align-self: center;
}
.hud-invite:hover { color: var(--mushroom-cream); }
@media (max-width: 600px) { .hud-invite { font-size: 11px; } }

/* "Show, don't tell" trampoline hint — fades in a beat after wake (when Cosmo
   demonstrates the trampoline), dismissed by the next tap or after 9s. */
.trampoline-hint {
  position: fixed;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 64px);
  z-index: 12;
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 17px;
  color: var(--mushroom-cream);
  text-shadow: 0 2px 14px rgba(20, 16, 26, 0.7);
  letter-spacing: 0.02em;
  pointer-events: none;
  opacity: 0;
  transition: opacity 800ms var(--ease-out-expo), transform 800ms var(--ease-out-expo);
}
.trampoline-hint.is-visible { opacity: 0.92; transform: translateX(-50%) translateY(0); }
@media (max-width: 600px) { .trampoline-hint { font-size: 14px; bottom: calc(env(safe-area-inset-bottom, 0px) + 150px); } }

/* Mobile-only disclaimer pill, dismissible. */
.mobile-disclaimer {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 124px);
  z-index: 20;
  display: none;
  align-items: center;
  gap: 0.5rem;
  background: rgba(20, 16, 26, 0.82);
  color: var(--mushroom-cream);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.04em;
  border: 1px solid rgba(244, 162, 97, 0.3);
  pointer-events: auto;
  max-width: calc(100vw - 32px);
  text-align: center;
  line-height: 1.3;
}
.mobile-disclaimer button {
  background: transparent;
  color: var(--saffron-glow);
  border: none;
  font: inherit;
  cursor: pointer;
  padding: 0 0 0 0.4rem;
  font-weight: 600;
}
.mobile-disclaimer.is-visible { display: inline-flex; }

.boot-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--ink-aubergine);
  color: var(--mushroom-cream);
  z-index: 100;
  transition: opacity 0.6s var(--ease-out-expo);
  pointer-events: none;
}
.boot-overlay.hidden { opacity: 0; pointer-events: none; }
.boot-overlay .title {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 2rem;
  color: var(--saffron-glow);
  margin-bottom: 1rem;
  opacity: 0;
  animation: boot-fade-in 600ms var(--ease-out-expo) 0ms forwards;
}
.boot-overlay .sub {
  font-size: 0.85rem;
  color: rgba(245,237,216,0.6);
  letter-spacing: 0.06em;
  text-align: center;
  max-width: 320px;
  line-height: 1.45;
}
.boot-overlay .await-touch {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
  margin-top: 1.2rem;
  opacity: 0;
  animation: boot-fade-in 600ms var(--ease-out-expo) 600ms forwards;
}
.boot-overlay.is-awaiting .await-touch { display: flex; }
.boot-overlay .await-touch .breath {
  font-style: italic;
  animation: boot-breath 2.4s ease-in-out infinite;
}
.boot-overlay canvas.mic-icon {
  width: 28px; height: 28px;
  display: block;
  opacity: 0.85;
  animation: boot-breath 2.4s ease-in-out infinite;
}
@keyframes boot-fade-in { to { opacity: 1; } }
@keyframes boot-breath {
  0%, 100% { opacity: 0.55; transform: scale(0.96); }
  50%      { opacity: 1.0;  transform: scale(1.04); }
}
</style>
</head>
<body>

<div class="play-shell">
  <canvas id="scene-canvas"></canvas>
  <div id="game-canvas"></div>

  <!-- invisible top-strip; hover/touchstart reveals .hud (game-info pill only). -->
  <div class="hud-reveal-zone" id="hud-reveal-zone" aria-hidden="true"></div>

  <div class="hud" id="hud-root">
    <div class="hud-left">
      <!-- game-info pill is injected by HudOverlay.attach() -->
      <a class="hud-invite" href="https://github.com/RichardTheuws/cosmos-2026" target="_blank" rel="noopener">built openly — make your own world →</a>
    </div>
  </div>

  <!-- "Show, don't tell" — fades in when Cosmo demonstrates the trampoline. -->
  <div class="trampoline-hint" id="trampoline-hint">tap the trampoline — watch him go</div>

  <div class="boot-overlay" id="boot">
    <div class="title">Cosmo awakening&hellip;</div>
    <!-- await-touch is shown ~0.6s after page-paint via JS adding .is-awaiting -->
    <div class="await-touch" id="boot-await">
      <canvas class="mic-icon" id="boot-mic" width="28" height="28" aria-hidden="true"></canvas>
      <div class="sub breath">tap to wake him</div>
    </div>
  </div>

  <div class="mobile-disclaimer" id="mobile-disclaimer" role="status">
    <span>Best on desktop · touch-controls active</span>
    <button type="button" id="mobile-disclaimer-close" aria-label="Close">×</button>
  </div>
</div>

<script type="module">
  // OnboardingDirector drives boot. We:
  //   1. paint a tiny canvas-drawn mic-icon (no emoji, no SVG asset)
  //   2. at 0.6s reveal the "tap to wake him" block (CSS animation handles fade)
  //   3. NEVER auto-hide the overlay here — OnboardingDirector calls
  //      hideBootOverlay() exactly when the first-touch lands.
  function paintMicIcon(canvas) {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.width, h = canvas.height;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    ctx.scale(dpr, dpr);
    // Saffron-glow stroke (#F4A261). Cap-shape mic (rounded body + base + stand).
    ctx.strokeStyle = '#F4A261';
    ctx.fillStyle = 'rgba(244, 162, 97, 0.18)';
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    const bx = 10, by = 6, bw = 8, bh = 12, br = 4;
    ctx.beginPath();
    ctx.moveTo(bx + br, by);
    ctx.lineTo(bx + bw - br, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + br);
    ctx.lineTo(bx + bw, by + bh - br);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh);
    ctx.lineTo(bx + br, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
    ctx.lineTo(bx, by + br);
    ctx.quadraticCurveTo(bx, by, bx + br, by);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // U-shape pickup arc under the body
    ctx.beginPath();
    ctx.arc(14, 19, 6, 0, Math.PI, false);
    ctx.stroke();
    // stand
    ctx.beginPath();
    ctx.moveTo(14, 22); ctx.lineTo(14, 26);
    ctx.moveTo(10, 26); ctx.lineTo(18, 26);
    ctx.stroke();
  }
  paintMicIcon(document.getElementById('boot-mic'));
  window.setTimeout(() => {
    document.getElementById('boot')?.classList.add('is-awaiting');
  }, 600);

  // Wave 22 — trampoline hint ("show, don't tell"). The first tap wakes Cosmo;
  // a beat later (as he walks over and demonstrates the trampoline) the hint
  // fades in. The next tap — or 9s — dismisses it. No nagging.
  (() => {
    // Wave 25.5 — LEGACY only. The trampoline lives in the forest-runner; in
    // substrate/dweller mode there is no trampoline in most worlds, so this
    // "tap the trampoline" hint leaked into the dunes/ink-ocean/chart. The
    // dweller's guidance is the chart's soft wenk instead.
    if (new URLSearchParams(location.search).get('substrate') === 'v2') return;
    const hint = document.getElementById('trampoline-hint');
    if (!hint) return;
    let firstTap = true;
    let visible = false;
    const hide = () => { hint.classList.remove('is-visible'); visible = false; };
    const show = () => { hint.classList.add('is-visible'); visible = true; window.setTimeout(hide, 9000); };
    window.addEventListener('pointerdown', () => {
      if (firstTap) { firstTap = false; window.setTimeout(show, 4500); }
      else if (visible) { hide(); }
    }, { passive: true });
  })();
  import('/src/main.ts').catch((err) => {
    console.error('Boot error:', err);
    const boot = document.getElementById('boot');
    if (boot) {
      boot.innerHTML = `
        <div class="title" style="color:#FF2D95;">Boot error</div>
        <div class="sub" style="max-width:600px;text-align:center;padding:1rem;">${String(err).replace(/</g, '&lt;')}</div>
        <a href="/" style="margin-top:2rem;color:var(--saffron-glow);">&larr; Back home</a>
      `;
    }
  });
</script>
</body>
</html>
