<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Speel · Cosmos Cosmic Adventure 2026</title>
<meta name="description" content="Speel Cosmos Cosmic Adventure 2026 in je browser — 2.5D psychedelische platformer met suction-cup wallcling.">
<meta name="theme-color" content="#3D2E4A">
<meta property="og:title" content="Speel · Cosmos Cosmic Adventure 2026">
<meta property="og:description" content="2.5D browser-platformer met aquarel-werelden en hallucinerende post-FX.">
<meta property="og:image" content="/showcase-assets/bg-cloud-cathedral-sky.png">
<meta property="og:url" content="https://theuws.com/games/cosmos-2026/play/">
<link rel="canonical" href="https://theuws.com/games/cosmos-2026/play/">
<link rel="icon" href="/showcase-assets/cosmo-hero-cleaned.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<style>
html, body { height: 100%; overflow: hidden; background: var(--ink-aubergine); }
.play-shell { position: fixed; inset: 0; }
#scene-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  display: block;
}
#game-canvas {
  position: absolute; inset: 0;
  z-index: 1;
}
#game-canvas canvas { display: block; }
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.6rem 1rem;
  padding-top: max(0.6rem, env(safe-area-inset-top, 0px));
  padding-left: max(1rem, env(safe-area-inset-left, 0px));
  padding-right: max(1rem, env(safe-area-inset-right, 0px));
  z-index: 10;
  font-family: var(--font-body);
  font-size: 1rem; /* desktop default; pill children override */
  pointer-events: none;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.hud-left, .hud-right { display: flex; gap: 0.6rem; align-items: center; pointer-events: auto; flex-wrap: wrap; }
.hud a {
  color: var(--mushroom-cream);
  background: rgba(20, 16, 26, 0.78);
  padding: 6px 14px; border-radius: 999px;
  text-decoration: none;
  font-size: 16px; /* desktop pill */
  letter-spacing: 0.05em;
  border: 1px solid rgba(244, 162, 97, 0.3);
}
.hud a:hover { background: var(--saffron-glow); color: var(--ink-aubergine); border-color: var(--saffron-glow); text-decoration: none; }
.hud-version {
  color: rgba(245, 237, 216, 0.6);
  font-family: var(--font-mono); font-size: 14px;
  letter-spacing: 0.1em;
  background: rgba(20, 16, 26, 0.55);
  padding: 4px 10px; border-radius: 4px;
}
/* Tablet: 14px pills */
@media (max-width: 1023px) {
  .hud a { font-size: 14px; padding: 5px 12px; }
  .hud-version { font-size: 12px; padding: 3px 8px; }
}
/* Mobile: 12px pills, tighter spacing, single-row safe-area top */
@media (max-width: 600px) {
  .hud { padding: 0.4rem 0.6rem; padding-top: max(0.4rem, env(safe-area-inset-top, 0px)); }
  .hud-left, .hud-right { gap: 0.35rem; }
  .hud a { font-size: 12px; padding: 4px 10px; }
  .hud-version { font-size: 11px; padding: 2px 6px; letter-spacing: 0.06em; }
}
/* Mobile-only disclaimer pill, dismissible. */
.mobile-disclaimer {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 124px); /* sits above the touch overlay */
  z-index: 20;
  display: none;
  align-items: center;
  gap: 0.5rem;
  background: rgba(20, 16, 26, 0.82);
  color: var(--mushroom-cream);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.04em;
  border: 1px solid rgba(244, 162, 97, 0.3);
  pointer-events: auto;
  max-width: calc(100vw - 32px);
  text-align: center;
  line-height: 1.3;
}
.mobile-disclaimer button {
  background: transparent;
  color: var(--saffron-glow);
  border: none;
  font: inherit;
  cursor: pointer;
  padding: 0 0 0 0.4rem;
  font-weight: 600;
}
.mobile-disclaimer.is-visible { display: inline-flex; }
.boot-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--ink-aubergine);
  color: var(--mushroom-cream);
  z-index: 100;
  transition: opacity 0.6s var(--ease-out-expo);
  pointer-events: none;
}
.boot-overlay.hidden { opacity: 0; pointer-events: none; }
.boot-overlay .title { font-family: var(--font-heading); font-style: italic; font-size: 2rem; color: var(--saffron-glow); margin-bottom: 1rem; }
.boot-overlay .sub { font-size: 0.85rem; color: rgba(245,237,216,0.6); letter-spacing: 0.06em; }
</style>
</head>
<body>

<div class="play-shell">
  <canvas id="scene-canvas"></canvas>
  <div id="game-canvas"></div>

  <div class="hud">
    <div class="hud-left">
      <a href="/">← Home</a>
      <a href="/lore/">Het Verhaal</a>
      <a href="/updates/">Updates</a>
    </div>
    <div class="hud-right">
      <span class="hud-version">v0.7.0 · Anim + Mobile + Sprites</span>
      <a href="/support/">Steun</a>
    </div>
  </div>

  <div class="boot-overlay" id="boot">
    <div class="title">Bloomroot Veld ontwaakt…</div>
    <div class="sub">L1 First Steps · ← → bewegen · Space springen · ↑↓ pan · houd richting tegen muur voor cling</div>
  </div>

  <div class="mobile-disclaimer" id="mobile-disclaimer" role="status">
    <span>Best on desktop · touch-controls actief</span>
    <button type="button" id="mobile-disclaimer-close" aria-label="Sluiten">×</button>
  </div>
</div>

<script type="module">
  import('/src/main.ts').then(() => {
    setTimeout(() => {
      document.getElementById('boot')?.classList.add('hidden');
    }, 600);
  }).catch((err) => {
    console.error('Boot error:', err);
    const boot = document.getElementById('boot');
    if (boot) {
      boot.innerHTML = `
        <div class="title" style="color:#FF2D95;">Boot error</div>
        <div class="sub" style="max-width:600px;text-align:center;padding:1rem;">${String(err).replace(/</g, '&lt;')}</div>
        <a href="/" style="margin-top:2rem;color:var(--saffron-glow);">← Terug naar home</a>
      `;
    }
  });
</script>
</body>
</html>
