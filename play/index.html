<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Speel · Cosmos Cosmic Adventure 2026</title>
<meta name="description" content="Cosmos · mobile-first hypnotische rhythm-trip. Cosmo woont hier — raak hem aan op het beat.">
<meta name="theme-color" content="#3D2E4A">
<meta property="og:title" content="Cosmos · rhythm-trip">
<meta property="og:description" content="Geen game. Geen score. De track is de game.">
<meta property="og:image" content="/showcase-assets/bg-cloud-cathedral-sky.png">
<meta property="og:url" content="https://theuws.com/games/cosmos-2026/play/">
<link rel="canonical" href="https://theuws.com/games/cosmos-2026/play/">
<link rel="icon" href="/showcase-assets/cosmo-hero-cleaned.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<style>
html, body { height: 100%; overflow: hidden; background: var(--ink-aubergine); }
.play-shell { position: fixed; inset: 0; }
#scene-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  display: block;
}
#game-canvas {
  position: absolute; inset: 0;
  z-index: 1;
}
#game-canvas canvas { display: block; }
/* ============================================================
   SPRINT 11B — Cosmic Cathedral HUD pills
   - Top-left:   game-info pill (label · hearts · bomb · star · state)
   - Top-right:  nav pill (Home / Verhaal / Updates / Steun) + version
   - Bottom:     controls-hint pill, auto-hide na 8s
   Glassmorph: rgba(20,16,26,0.55) + backdrop-blur(20px)
              + 1px stroke faded-rose 0.3 alpha + radius 18px.
   ============================================================ */
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 18px;
  padding-top: max(14px, env(safe-area-inset-top, 0px));
  padding-left: max(18px, env(safe-area-inset-left, 0px));
  padding-right: max(18px, env(safe-area-inset-right, 0px));
  z-index: 10;
  font-family: var(--font-body);
  pointer-events: none;
  gap: 0.6rem;
  flex-wrap: nowrap;
  /* Sprint 14D — invisible-by-default. Hover/focus/tap reveals. */
  opacity: 0.25;
  transform: scale(0.92);
  transform-origin: top center;
  transition: opacity 220ms ease-out, transform 220ms ease-out;
  will-change: opacity, transform;
}
.hud:hover,
.hud:focus-within,
.hud.is-revealed {
  opacity: 1;
  transform: scale(1);
}
/* AutoVJ engaged: complete blackout of the top-nav. */
.hud.is-autovj-hidden {
  opacity: 0 !important;
  transform: scale(0.9) !important;
  pointer-events: none !important;
}
.hud-left, .hud-right {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  pointer-events: auto;
  flex-wrap: wrap;
}
.hud-right { justify-content: flex-end; }
/* Hover-affordance hot-zone — invisible 80px strip at top to catch mobile taps. */
.hud-reveal-zone {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 80px;
  z-index: 9;
  pointer-events: auto;
  background: transparent;
  /* Tap on this zone toggles .is-revealed on the parent .hud via :has(). */
}
.hud-reveal-zone:hover ~ .hud,
.hud-reveal-zone:active ~ .hud {
  opacity: 1;
  transform: scale(1);
}

/* Shared pill chrome — used for all three HUD elements. */
.hud-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  background: rgba(20, 16, 26, 0.55);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(244, 162, 97, 0.3);
  border-radius: 18px;
  padding: 10px 14px;
  color: var(--mushroom-cream);
  box-shadow: 0 6px 18px rgba(20, 16, 26, 0.18);
  pointer-events: auto;
}

/* ===== Top-left: game-info pill ===== */
.hud-pill--gameinfo .hud-pill__label {
  font-family: var(--font-heading);
  font-style: italic;
  font-weight: 500;
  font-size: 18px;
  color: var(--saffron-glow);
  letter-spacing: 0.01em;
  margin-right: 0.25rem;
}
.hud-pill--gameinfo .hud-pill__hearts {
  display: inline-block;
  vertical-align: middle;
}
.hud-pill--gameinfo .hud-pill__icon {
  display: inline-block;
  vertical-align: middle;
}
.hud-pill--gameinfo .hud-pill__count {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.04em;
  color: var(--mushroom-cream);
  min-width: 1.4ch;
  text-align: right;
}
.hud-pill--gameinfo .hud-pill__state {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 12px;
  color: rgba(245, 237, 216, 0.6);
  margin-left: 0.5rem;
  letter-spacing: 0.06em;
}

/* ===== Top-right: nav pill ===== */
.hud-nav {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(20, 16, 26, 0.55);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(244, 162, 97, 0.3);
  border-radius: 18px;
  padding: 6px 8px;
  pointer-events: auto;
}
.hud-nav a {
  color: var(--mushroom-cream);
  font-size: 14px;
  font-family: var(--font-body);
  letter-spacing: 0.04em;
  padding: 6px 12px;
  border-radius: 12px;
  text-decoration: none;
  transition: background-color 220ms var(--ease-out-expo),
              color 220ms var(--ease-out-expo);
}
.hud-nav a:hover {
  background: var(--saffron-glow);
  color: var(--ink-aubergine);
  text-decoration: none;
}
.hud-version {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  background: var(--ink-aubergine);
  color: var(--mushroom-cream);
  padding: 5px 10px;
  border-radius: 12px;
  border: 1px solid rgba(244, 162, 97, 0.18);
  white-space: nowrap;
}

/* ===== Bottom-center: controls hint pill ===== */
.hud-pill--controls {
  position: fixed;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
  z-index: 11;
  font-size: 12px;
  letter-spacing: 0.05em;
  pointer-events: none;
  opacity: 0;
  transition: opacity 600ms var(--ease-out-expo),
              transform 600ms var(--ease-out-expo);
  padding: 8px 16px;
}
.hud-pill--controls.hud-pill--visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.hud-pill--controls .hud-key {
  display: inline-flex;
  align-items: baseline;
  gap: 0.35rem;
}
.hud-pill--controls .hud-key + .hud-key { margin-left: 0.2rem; }
.hud-pill--controls .hud-key__sym {
  font-family: var(--font-mono);
  color: var(--saffron-glow);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.hud-pill--controls .hud-key__lbl {
  font-family: var(--font-body);
  color: rgba(245, 237, 216, 0.78);
  font-style: italic;
  font-size: 11px;
}

/* Tablet (<1024px): pills slightly tighter */
@media (max-width: 1023px) {
  .hud-pill { padding: 9px 12px; gap: 0.45rem; }
  .hud-pill--gameinfo .hud-pill__label { font-size: 16px; }
  .hud-pill--gameinfo .hud-pill__count { font-size: 13px; }
  .hud-nav a { font-size: 13px; padding: 5px 10px; }
  .hud-version { font-size: 11px; padding: 4px 8px; }
}

/* Mobile (<600px): compactere pills, hide controls hint (touch overlay heeft eigen guidance) */
@media (max-width: 600px) {
  .hud { padding: 10px 10px; padding-top: max(10px, env(safe-area-inset-top, 0px)); }
  .hud-pill { padding: 8px 10px; gap: 0.35rem; border-radius: 14px; }
  .hud-pill--gameinfo .hud-pill__label { font-size: 14px; }
  .hud-pill--gameinfo .hud-pill__count { font-size: 12px; }
  .hud-pill--gameinfo .hud-pill__state { display: none; }
  .hud-nav { padding: 4px 6px; border-radius: 14px; }
  .hud-nav a { font-size: 12px; padding: 4px 8px; border-radius: 10px; }
  .hud-version { font-size: 10px; padding: 3px 6px; letter-spacing: 0.06em; }
  .hud-pill--controls { display: none !important; }
}
/* Mobile-only disclaimer pill, dismissible. */
.mobile-disclaimer {
  position: fixed;
  left: 50%; transform: translateX(-50%);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 124px); /* sits above the touch overlay */
  z-index: 20;
  display: none;
  align-items: center;
  gap: 0.5rem;
  background: rgba(20, 16, 26, 0.82);
  color: var(--mushroom-cream);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.04em;
  border: 1px solid rgba(244, 162, 97, 0.3);
  pointer-events: auto;
  max-width: calc(100vw - 32px);
  text-align: center;
  line-height: 1.3;
}
.mobile-disclaimer button {
  background: transparent;
  color: var(--saffron-glow);
  border: none;
  font: inherit;
  cursor: pointer;
  padding: 0 0 0 0.4rem;
  font-weight: 600;
}
.mobile-disclaimer.is-visible { display: inline-flex; }
.boot-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--ink-aubergine);
  color: var(--mushroom-cream);
  z-index: 100;
  transition: opacity 0.6s var(--ease-out-expo);
  pointer-events: none;
}
.boot-overlay.hidden { opacity: 0; pointer-events: none; }
.boot-overlay .title {
  font-family: var(--font-heading);
  font-style: italic;
  font-size: 2rem;
  color: var(--saffron-glow);
  margin-bottom: 1rem;
  opacity: 0;
  animation: boot-fade-in 600ms var(--ease-out-expo) 0ms forwards;
}
.boot-overlay .sub {
  font-size: 0.85rem;
  color: rgba(245,237,216,0.6);
  letter-spacing: 0.06em;
  text-align: center;
  max-width: 320px;
  line-height: 1.45;
}
/* Sprint 15D — "tik om te ontwaken" pulses with breath; mic-icon canvas lives
   above it. Both hidden until 0.6s after page-paint so the title reads first. */
.boot-overlay .await-touch {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
  margin-top: 1.2rem;
  opacity: 0;
  animation: boot-fade-in 600ms var(--ease-out-expo) 600ms forwards;
}
.boot-overlay.is-awaiting .await-touch { display: flex; }
.boot-overlay .await-touch .breath {
  font-style: italic;
  animation: boot-breath 2.4s ease-in-out infinite;
}
.boot-overlay canvas.mic-icon {
  width: 28px; height: 28px;
  display: block;
  opacity: 0.85;
  animation: boot-breath 2.4s ease-in-out infinite;
}
@keyframes boot-fade-in { to { opacity: 1; } }
@keyframes boot-breath {
  0%, 100% { opacity: 0.55; transform: scale(0.96); }
  50%      { opacity: 1.0;  transform: scale(1.04); }
}
</style>
</head>
<body>

<div class="play-shell">
  <canvas id="scene-canvas"></canvas>
  <div id="game-canvas"></div>

  <!-- Sprint 14D — invisible top-strip; hover/touchstart reveals .hud. -->
  <div class="hud-reveal-zone" id="hud-reveal-zone" aria-hidden="true"></div>

  <div class="hud" id="hud-root">
    <div class="hud-left">
      <!-- Sprint 11B — game-info pill is injected by HudOverlay.attach() -->
    </div>
    <div class="hud-right">
      <nav class="hud-nav" aria-label="Navigatie">
        <a href="/">&larr; Home</a>
        <a href="/lore/">Het Verhaal</a>
        <a href="/updates/">Updates</a>
        <a href="/support/">Steun</a>
      </nav>
      <span class="hud-version">v1.4.0 · smoothness + calm-baseline</span>
    </div>
  </div>

  <div class="boot-overlay" id="boot">
    <div class="title">Cosmos ontwaakt&hellip;</div>
    <!-- Sprint 15D — await-touch sub-block. Hidden until JS adds .is-awaiting
         on the boot element ~0.6s after page-paint, so the italic title fades
         in first and only THEN the "tik om te ontwaken" prompt appears. -->
    <div class="await-touch" id="boot-await">
      <canvas class="mic-icon" id="boot-mic" width="28" height="28" aria-hidden="true"></canvas>
      <div class="sub breath">tik om te ontwaken</div>
    </div>
  </div>

  <div class="mobile-disclaimer" id="mobile-disclaimer" role="status">
    <span>Best on desktop · touch-controls actief</span>
    <button type="button" id="mobile-disclaimer-close" aria-label="Sluiten">×</button>
  </div>
</div>

<script type="module">
  // Sprint 15D — boot is now driven by OnboardingDirector. We:
  //   1. paint a tiny canvas-drawn mic-icon (no emoji, no SVG asset)
  //   2. at 0.6s reveal the "tik om te ontwaken" block (CSS animation handles fade)
  //   3. NEVER auto-hide the overlay here — OnboardingDirector calls
  //      hideBootOverlay() exactly when the first-touch lands.
  function paintMicIcon(canvas) {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.width, h = canvas.height;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    ctx.scale(dpr, dpr);
    // Saffron-glow stroke (#F4A261). Cap-shape mic (rounded body + base + stand).
    ctx.strokeStyle = '#F4A261';
    ctx.fillStyle = 'rgba(244, 162, 97, 0.18)';
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    // mic body: rounded-rect 10..18 wide, 6..18 tall, radius 4
    const bx = 10, by = 6, bw = 8, bh = 12, br = 4;
    ctx.beginPath();
    ctx.moveTo(bx + br, by);
    ctx.lineTo(bx + bw - br, by);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + br);
    ctx.lineTo(bx + bw, by + bh - br);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh);
    ctx.lineTo(bx + br, by + bh);
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
    ctx.lineTo(bx, by + br);
    ctx.quadraticCurveTo(bx, by, bx + br, by);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // U-shape pickup arc under the body
    ctx.beginPath();
    ctx.arc(14, 19, 6, 0, Math.PI, false);
    ctx.stroke();
    // stand
    ctx.beginPath();
    ctx.moveTo(14, 22); ctx.lineTo(14, 26);
    ctx.moveTo(10, 26); ctx.lineTo(18, 26);
    ctx.stroke();
  }
  paintMicIcon(document.getElementById('boot-mic'));
  // Reveal "tik om te ontwaken" 0.6s after paint, matching the brief's
  // checkpoint. The title's own 600ms fade-in happens via CSS keyframe.
  window.setTimeout(() => {
    document.getElementById('boot')?.classList.add('is-awaiting');
  }, 600);
  import('/src/main.ts').catch((err) => {
    console.error('Boot error:', err);
    const boot = document.getElementById('boot');
    if (boot) {
      boot.innerHTML = `
        <div class="title" style="color:#FF2D95;">Boot error</div>
        <div class="sub" style="max-width:600px;text-align:center;padding:1rem;">${String(err).replace(/</g, '&lt;')}</div>
        <a href="/" style="margin-top:2rem;color:var(--saffron-glow);">&larr; Terug naar home</a>
      `;
    }
  });
</script>
</body>
</html>
